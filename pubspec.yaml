name: my_day
description: "MyDay!!!!! — Your daily life companion"
publish_to: 'none'

version: 0.4.0+14

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^1.0.4

  # Navigation
  go_router: ^14.8.1

  # Theming
  flex_color_scheme: ^8.2.0

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.1.0

  # Charts (finance analysis)
  fl_chart: ^0.70.2

  # i18n
  intl: ^0.20.2

  # Utilities
  uuid: ^4.5.1
  path: ^1.9.0
  path_provider: ^2.1.5
  archive: ^4.0.4
  local_notifier: ^0.1.6
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0
  file_picker: ^9.2.1
  http: ^1.4.0
  device_preview: ^1.2.0
  tray_manager: ^0.2.3
  window_manager: ^0.4.3
  package_info_plus: ^9.0.0

  # Local HTTP API server (desktop)
  shelf: ^1.4.0
  shelf_router: ^1.1.0

  # Auto-start on boot (desktop)
  launch_at_startup: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  msix: ^3.16.8
  image: ^4.8.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  generate: true

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/app_icon.ico
    - assets/icon/
    - assets/banks.json
    - assets/template_finance.csv
    - assets/template_intimacy.csv
    - assets/template_weight.csv

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

msix_config:
  display_name: MyDay!!!!!
  publisher_display_name: yuanzhe
  identity_name: com.yuanzhe.myday
  msix_version: 0.8.1.0
  logo_path: assets/icon/app_icon.png
  capabilities: internetClient
  install_certificate: false
